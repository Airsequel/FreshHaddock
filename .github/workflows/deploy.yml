name: Deploy Website

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libraries
        # Required by bindings-GLFW (X11 + GL), dear-imgui (SDL2 + GLEW),
        # magic (libmagic), and webp (libwebp)
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libgl1-mesa-dev \
            libglew-dev \
            libglu1-mesa-dev \
            libmagic-dev \
            libsdl2-dev \
            libwebp-dev \
            xorg-dev

      - name: Cache Stack directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: freshhaddock_stack_ubuntu_${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
          restore-keys: freshhaddock_stack_ubuntu_

      - name: Install Dependencies
        run: stack --no-terminal --install-ghc test --only-dependencies

      - name: Build
        run: make build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
